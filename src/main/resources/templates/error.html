<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Status Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .error-card { background: white; border-radius: 16px; padding: 3rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 600px; }
    </style>
</head>
<body>
<div class="container">
    <div class="error-card mx-auto">
        <div class="text-center mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
            <h1 class="mt-3" th:text="${status}">Error</h1>
            <h4 class="text-muted" th:text="${error}">Error Type</h4>
        </div>
        <div class="alert alert-danger">
            <strong>Message:</strong> <span th:text="${message}">Error message</span>
        </div>
        <p class="text-muted"><strong>Path:</strong> <code th:text="${path}">/path</code></p>
        <div class="text-center mt-4">
            <a href="/" class="btn btn-primary me-2"><i class="bi bi-house"></i> Go Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Go Back</a>
        </div>
    </div>
</div>
</body>
</html>
